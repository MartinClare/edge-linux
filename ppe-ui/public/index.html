<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="PPE Detection UI - YOLOv8 Backend"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <script>
      // Rewrite localhost endpoints to current device hostname on LAN deployments.
      (function () {
        var host = location.hostname;
        if (host === 'localhost' || host === '127.0.0.1') return;
        var protocol = location.protocol;
        var wsProtocol = protocol === 'https:' ? 'wss:' : 'ws:';
        function rewrite(url) {
          if (typeof url !== 'string') return url;
          return url
            .replace(/https?:\/\/localhost:8000/g, protocol + '//' + host + ':8000')
            .replace(/https?:\/\/localhost:3001/g, protocol + '//' + host + ':3001')
            .replace(/https?:\/\/localhost:3002/g, protocol + '//' + host + ':3002')
            .replace(/wss?:\/\/localhost:8000/g, wsProtocol + '//' + host + ':8000');
        }

        var originalFetch = window.fetch;
        window.fetch = function (url, opts) {
          return originalFetch.call(this, typeof url === 'string' ? rewrite(url) : url, opts);
        };

        var OriginalWebSocket = window.WebSocket;
        function PatchedWebSocket(url, protocols) {
          url = rewrite(url);
          return protocols !== undefined
            ? new OriginalWebSocket(url, protocols)
            : new OriginalWebSocket(url);
        }
        PatchedWebSocket.prototype = OriginalWebSocket.prototype;
        PatchedWebSocket.CONNECTING = OriginalWebSocket.CONNECTING;
        PatchedWebSocket.OPEN = OriginalWebSocket.OPEN;
        PatchedWebSocket.CLOSING = OriginalWebSocket.CLOSING;
        PatchedWebSocket.CLOSED = OriginalWebSocket.CLOSED;
        window.WebSocket = PatchedWebSocket;

        var originalOpen = XMLHttpRequest.prototype.open;
        XMLHttpRequest.prototype.open = function () {
          if (typeof arguments[1] === 'string') {
            arguments[1] = rewrite(arguments[1]);
          }
          return originalOpen.apply(this, arguments);
        };
      })();
    </script>
    <title>PPE Detection UI</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
