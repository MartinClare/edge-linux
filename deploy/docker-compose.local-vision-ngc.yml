services:
  local-vision:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.local-vision-ngc
    image: avision-local-vision-ngc:latest
    container_name: avision-local-vision
    restart: unless-stopped
    gpus: all
    ipc: host
    shm_size: "16gb"
    ports:
      - "8001:8001"
    environment:
      DEFAULT_MODEL_ID: gemma-4-e4b
      LOCAL_VISION_BACKEND: vllm
      PRECLOAD_DEFAULT: "1"
      QWEN25_VL_PATH: /models/Qwen2.5-VL-7B-Instruct
      QWEN3_VL_8B_PATH: /models/Qwen3-VL-8B-Instruct
      GEMMA4_E4B_PATH: /models/gemma-4-E4B-it
      GEMMA3N_E4B_PATH: /models/gemma-3n-E4B-it
      GEMMA3N_E2B_PATH: /models/gemma-3n-E2B-it
      ALERT_USE_ROLE: inspector
      MAX_NEW_TOKENS_INSPECT: "512"
      MAX_NEW_TOKENS_EVAL: "1024"
      MAX_NEW_TOKENS_ALERT: "768"
      VISUAL_TOKENS: "512"
      VLLM_MAX_MODEL_LEN: "8192"
      VLLM_GPU_MEMORY_UTILIZATION: "0.90"
      VLLM_TENSOR_PARALLEL_SIZE: "1"
      VLLM_MAX_NUM_SEQS: "4"
      VLLM_MAX_SOFT_TOKENS: "280"
      VLLM_VISION_SOFT_TOKENS: "1120"
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      TRITON_PTXAS_PATH: /usr/local/cuda/bin/ptxas
      TRITON_PTXAS_BLACKWELL_PATH: /usr/local/cuda/bin/ptxas
    volumes:
      - /home/interlv/models:/models:ro
